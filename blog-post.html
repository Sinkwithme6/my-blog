      title: 'Into the Unknown:<em>Camping at Bethanchwok</em>',
      body: `<p>The day before our hike to Naranthan, known as Bethanchwok, was filled with the familiar excitement that always made sleep difficult. It was me, Ramesh, and Suraj. Instead of sleeping, I stayed up late, watching hiking vlogs, trying to gather a better sense of what lay ahead. There's something thrilling about the unknown.</p>

<p>By 4 a.m., still riding on that restless excitement, Ramesh and I began packing. We moved quickly, knowing our adventure was just hours away. We caught the bus from Radhe Radhe to Panauti. Suraj, who lived in Suryabinayak, met us on board. None of us knew that the journey would take an unexpected turn.</p>

<p>As always, I made sure to sit next to the bus driver, hoping to gain some local insights. To my surprise, he turned out to be as much of an adventurer as we were. With a twinkle in his eye, he shared tales of camping in Bethanchwok with his friends, describing nights spent under the stars in the wilderness. Just as I was getting wrapped up in his story, an old man, probably in his 70s, sitting nearby, leaned in. "I've been to Naranthan more than ten times," he said, his voice low but certain. His weathered face spoke of wisdom and secrets. "Don't go into the cave," he warned. "It's dense and slippery. Many have entered, few have returned."</p>

<p>A chill ran down my spine. We exchanged glances, unsure if he was exaggerating or if this was a real warning. Either way, our anticipation skyrocketed. In what felt like no time, we arrived in Panauti. The market was bustling, but we stayed focused. We grabbed essentials: a couple of noodle packets, 1 kg of apples and oranges, and coffee supplies — because what's an adventure without coffee? I had packed a kettle, so coffee was non-negotiable.</p>

<p>After waiting for about 30 minutes, the bus started its climb toward Dhungkharka. The road felt long, but our spirits were high. We finally arrived, had a quick lunch, stocked up on water, and at exactly 10 a.m., we began our hike. Barely a few minutes in, I asked a local when the last bus for Kathmandu would leave. "4:30 p.m.," he said. My heart sank. Ramesh, ahead of me, suddenly stopped dead in his tracks. "We won't make it," he said, his voice tense. "We'll miss the bus."</p>

<p>We paused. The realization dawned on us — there was no way back today. But then, an idea flashed through my mind. "What if we camp at Bethanchwok? It's better to camp there than stay here at a hotel in Dhungkharka — we won't reach home today anyway," I suggested. Suraj quickly dismissed it, nervous. "We have nothing for camping — it's too risky." Ramesh chuckled. "Three packets of noodles and some fruit, and you want to camp?" he teased. But I remembered something from the vlogs — there was a homestay where we could rent a tent. Suddenly, the idea of camping felt real. We debated for a while, and finally, curiosity won over caution. We agreed — if we found a tent, we'd camp.</p>

<p>After an hour of hiking, we reached a homestay. The place was quiet, but we managed to rent a tent and three sleeping bags. We stocked up on more noodles and water, knowing full well we weren't equipped to cook anything else. Armed with the bare minimum, we left the homestay, still unsure if this was a good idea. It was all unplanned. Our parents had no clue. And the weather… well, that was another thing.</p>

<p>Before we left, the homestay owner, a kind but firm woman, gave us a cryptic warning: "No non-veg near the temple," she said. "And take everything you need — there's nothing beyond here."</p>

<p>With no lights and no real supplies, we began our unplanned camping journey. As we walked deeper into the forest, a dog appeared. Without hesitation, it started leading the way. We named him "Khaire," and, without a doubt, he became our guide. The trail had no markers, and the forest was dense, darker than we expected. Khaire led us deeper into the unknown.</p>

<p>Suddenly, we stumbled upon a potato field. Suraj grinned mischievously. "Let's take a few — potatoes roasted over a campfire sound perfect." We dug up a few and shoved them into our bags, feeling like we had stumbled upon hidden treasure. It felt almost too easy — too perfect. But nature has its ways of humbling us.</p>

<p>The trail grew darker, the forest thicker. Time seemed to stretch, and our pace slowed as we navigated the dense trees. Fog rolled in, thick and suffocating. Soon, we could barely see a few meters ahead. Khaire kept leading, but even he seemed uncertain at times. The silence was frightening.</p>

<p>Around 3:30 p.m., we reached Buddha Park. The fog was so dense that we couldn't see anything beyond a few feet. The cold started to bite, and an eerie silence filled the air. We met a group of hikers coming down — they told us there was no one at the top, and they were leaving before dark. The unease grew. And then, out of nowhere, a second dog appeared. This one we named "Kala." He seemed to hesitate before joining us, as if deciding whether to accompany us on this strange journey. Now, with two dogs by our side, we felt safer, though a sense of mystery still hung in the air.</p>

<p>As we climbed higher, the fog thickened. The weather felt almost otherworldly, the trees like silent watchers in the mist. At 4:30, we reached the top — Bethanchwok. But instead of the panoramic views we were hoping for, all we saw was a wall of fog. The famous views of Terai and the mountains were lost to us, hidden behind a veil of white.</p>

<p>Night was falling fast, and panic began to set in. We scrambled to find dry wood for a fire, but everything was soaked from the week-long rain. Without a fire, how would we cook? How would we keep warm? The reality of our situation hit us like a cold wind. We weren't just camping — we were surviving. Almost half an hour down from the top, we set out on our "wood hunt," but there was barely anything dry. Among the few sticks we found, some seemed less soaked than others. Kala stayed with us, while Khaire rested at the top, almost like he was guarding our bags.</p>

<p>By 5:30, the wind was howling, relentless, and there was no way we could light a fire out in the open. We spotted a small, unfinished structure, like a 'Pati,' and decided to use it as cover for the fire. The urgency set in — it was getting darker fast, and all our phones were dead. No light, no backup. We divided the tasks: Ramesh worked on starting the fire, while Suraj and I tackled the tent. Setting up the tent felt like trying to solve a Rubik's Cube, not knowing where to begin. After some struggle, we managed to get it up, but the fire was still a no-go. The wood was too wet.</p>

<p>By now, the darkness was complete, and the cold sank in deeper. Suraj started praying, asking for the fire to light. Ramesh and I couldn't help but laugh at his prayer, but a few minutes later, somehow, Ramesh finally got a flame going. The sight of that fire — small but alive — brought a wave of relief, not just from the cold but from the fear creeping in. We cooked noodles and potatoes over the flames, and in that moment, noodles tasted like a five-star meal. Ramesh deserved all the credit. We shared biscuits with Kala and Khaire as thanks.</p>

<p>The cold was biting now, cutting through our thin T-shirts. Ramesh and I were holding up okay, but Suraj — his face was red, and he was clearly struggling. My mind started racing — what if he got sick? As a spiritual person, I believed in protecting against negative energy, so I applied a 'tika' from my foot, hoping it would help. Coincidence or not, Suraj seemed to feel better soon after. After some time by the fire, we got back to the tent.</p>

<p>It was Friday, so we still held out hope that other groups might show up, but by 9 p.m., it was just us. The wind raged, slapping against the tent like it was trying to tear it apart. We were inside, chatting, when suddenly we heard it — a whistle. Sharp and loud. Kala and Khaire started barking furiously. Ramesh, hopeful, said, "la kta hru aaya jasto xha, aba ramilo hunxha." But none of us moved from the tent. A few minutes passed, and still, there was no other sound. Then, with a tight voice, Suraj said, "oii tarsiyo ki k ho koi manxha tw aako xhaina jasto xha tw."</p>

<p>Our hearts were beating fast. What was it? An animal? But animals don't whistle… do they? For 20 minutes, fear gripped us, tightening like a knot. There was no way any of us could sleep now. Then, just when the tension started to ease, Ramesh fell asleep, leaving Suraj and me in uneasy silence. Suraj kicked Ramesh awake, and we forced ourselves into conversation, trying to distract from the creeping fear.</p>

<p>But around 11 p.m., it happened again. Kala and Khaire started barking, even louder this time. This was different — something was out there. Ramesh's voice trembled as he said, "It could be a leopard. Maybe it's drawn to the dogs… or the food waste hikers leave behind." Suddenly, it all clicked — the man-made trash bin nearby, full of leftover scraps. Had an animal been visiting this spot, lured by the scent of food? Our minds spun with terrifying possibilities.</p>

<p>As midnight came, a strange stillness took over. The darkness was so thick we couldn't see much, making every little sound feel louder and closer. Suraj needed to relieve himself, but none of us had the guts to go out alone. We convinced him to hold on, but after nearly forty minutes, he couldn't wait any longer. The three of us finally went out together, each holding a stick just in case. We quickly fixed the tent, which had nearly collapsed from the strong winds, and then faced a new problem — two of our sleeping bags had broken zippers. In the freezing cold, we used them as blankets, which didn't help much. Time seemed to crawl; every five minutes felt like hours.</p>

<p>Then, out of nowhere, one of the dogs started barking — but this time it sounded different. It wasn't a normal bark. It sounded more like crying. "Is it because of the cold, or is something else out there?" Suraj whispered nervously. There was nothing we could do except sit in fear, wondering what might come next.</p>

<p>After what felt like an eternity, the clock finally turned to 5 a.m. I unzipped the tent to peek outside, but the thick fog still cloaked everything. Despite the weather, we decided to pack up and head down as early as we could. Just as we were getting ready, a figure appeared through the fog — how could someone reach this remote spot at 5:30 in the morning? But soon after, a few more people arrived. They were locals of Bethanchwok, who believed that worshipping at Naranthan early on a Saturday morning would make their wishes come true. It made sense why they had braved such difficult conditions.</p>

<p>The view from Bethanchwok was still hidden by fog, so we made our thanks at the Naranthan temple and left with memories we'd never forget. Kala refused to come with us on the way back, but Khaire stayed by our side all the way down to Dhungkharka. As we finally boarded the bus back home, exhausted but satisfied, I glanced at Ramesh and Suraj. We didn't have to say anything — we all knew this was just the beginning of more adventures to come. The mountains, after all, always have more stories waiting to be discovered.</p>
        `

  const post = posts[postIndex] || posts[0];
 
  // Populate page
  document.title = post.title.replace(/<[^>]+>/g, '') + ' — My Blog';
  document.getElementById('postCategory').textContent = post.category;
  document.getElementById('navTag').textContent = post.tag;
  document.getElementById('navTitle').textContent = 'My Blog';
  document.getElementById('postTitle').innerHTML = post.title;
  document.getElementById('postDate').textContent = post.date;
  document.getElementById('postReadTime').textContent = post.readTime;
  document.getElementById('articleBody').innerHTML = post.body;
  document.getElementById('postHero').setAttribute('data-num', post.num);
 
  // Prev / Next navigation
  const prevPost = postIndex > 0 ? posts[postIndex - 1] : null;
  const nextPost = postIndex < posts.length - 1 ? posts[postIndex + 1] : null;
 
  const navPrev = document.getElementById('navPrev');
  const navNext = document.getElementById('navNext');
 
  if (prevPost) {
    document.getElementById('navPrevTitle').innerHTML = prevPost.title;
    navPrev.href = `blog-post.html?post=${prevPost.id}`;
  } else {
    navPrev.style.opacity = '0.3';
    navPrev.style.pointerEvents = 'none';
    document.getElementById('navPrevTitle').textContent = 'This is the first story';
  }
 
  if (nextPost) {
    document.getElementById('navNextTitle').innerHTML = nextPost.title;
    navNext.href = `blog-post.html?post=${nextPost.id}`;
  } else {
    navNext.style.opacity = '0.3';
    navNext.style.pointerEvents = 'none';
    document.getElementById('navNextTitle').textContent = 'This is the latest story';
  }
 
  // Reading progress bar
  window.addEventListener('scroll', () => {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
    document.getElementById('progressBar').style.width = progress + '%';
  });
</script>
</body>
</html>
