<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Post — Travel Stories</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg: #f0ebe3;
      --bg-card: #e8e2d9;
      --ink: #1a1a2e;
      --ink-muted: #5a5a6e;
      --rust: #c0452a;
      --rust-dark: #a33820;
      --rule: #c8c2b8;
      --serif: 'Playfair Display', Georgia, serif;
      --body: 'EB Garamond', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
    }
 
    html { scroll-behavior: smooth; }
 
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--body);
      font-size: 19px;
      line-height: 1.75;
      min-height: 100vh;
    }
 
    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 3rem;
      border-bottom: 1px solid var(--rule);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-back {
      font-family: var(--sans);
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--rust); }
    .nav-back svg { width: 14px; height: 14px; flex-shrink: 0; }
    .nav-center {
      font-family: var(--sans);
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }
    .nav-tag {
      font-family: var(--sans);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--rust);
      background: rgba(192, 69, 42, 0.1);
      padding: 0.25rem 0.65rem;
      border-radius: 2px;
    }
 
    /* ── PROGRESS BAR ── */
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 2px;
      background: var(--rust);
      width: 0%;
      z-index: 200;
      transition: width 0.1s linear;
    }
 
    /* ── HERO ── */
    .post-hero {
      background: var(--ink);
      color: var(--bg);
      padding: 5rem 3rem 4rem;
      position: relative;
      overflow: hidden;
    }
    .post-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 70% 50%, rgba(192,69,42,0.18) 0%, transparent 65%);
      pointer-events: none;
    }
    .post-hero::after {
      content: attr(data-num);
      position: absolute;
      right: 3rem;
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--serif);
      font-size: 10rem;
      font-weight: 700;
      color: rgba(255,255,255,0.04);
      line-height: 1;
      pointer-events: none;
      user-select: none;
    }
    .hero-inner {
      max-width: 720px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    .post-category {
      font-family: var(--sans);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--rust);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .post-category::before {
      content: '';
      display: block;
      width: 24px;
      height: 1px;
      background: var(--rust);
    }
    .post-hero h1 {
      font-family: var(--serif);
      font-size: clamp(2.4rem, 5vw, 4rem);
      font-weight: 400;
      line-height: 1.1;
      color: #f0ebe3;
      margin-bottom: 1.8rem;
    }
    .post-hero h1 em {
      font-style: italic;
      color: #e8a87c;
    }
    .post-meta-row {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .meta-item {
      font-family: var(--sans);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(240,235,227,0.45);
    }
    .meta-dot { color: rgba(255,255,255,0.2); }
 
    /* ── ARTICLE BODY ── */
    .article-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 4rem 3rem 6rem;
    }
 
    .article-body p {
      font-family: var(--body);
      font-size: 1.05rem;
      line-height: 1.9;
      color: var(--ink);
      margin-bottom: 1.6rem;
    }
 
    .article-body p:first-of-type::first-letter {
      font-size: 4.2rem;
      font-family: var(--serif);
      font-weight: 600;
      float: left;
      line-height: 0.78;
      margin-right: 0.08em;
      margin-top: 0.08em;
      color: var(--rust);
    }
 
    .article-body h3 {
      font-family: var(--serif);
      font-size: 1.55rem;
      font-weight: 400;
      font-style: italic;
      color: var(--ink);
      margin: 3rem 0 1rem;
      padding-top: 2rem;
      border-top: 1px solid var(--rule);
    }
 
    .article-body blockquote {
      margin: 2.5rem 0;
      padding: 1.5rem 2rem;
      background: var(--bg-card);
      border-left: 3px solid var(--rust);
      position: relative;
    }
    .article-body blockquote::before {
      content: '\201C';
      font-family: var(--serif);
      font-size: 4rem;
      color: var(--rust);
      opacity: 0.3;
      position: absolute;
      top: -0.5rem;
      left: 1rem;
      line-height: 1;
    }
    .article-body blockquote p {
      font-style: italic;
      color: var(--ink-muted);
      font-size: 1.1rem;
      margin: 0;
      position: relative;
      z-index: 1;
    }
    .article-body blockquote p::first-letter { all: unset; }
 
    /* ── PULL QUOTE ── */
    .pull-quote {
      font-family: var(--serif);
      font-size: 1.5rem;
      font-style: italic;
      line-height: 1.45;
      color: var(--ink);
      text-align: center;
      padding: 2.5rem 1.5rem;
      margin: 2rem 0;
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      position: relative;
    }
    .pull-quote em { color: var(--rust); }
 
    /* ── END MARK ── */
    .end-mark {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--rule);
    }
    .end-mark::before, .end-mark::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--rule);
    }
    .end-mark-symbol {
      font-family: var(--serif);
      font-size: 1.2rem;
      color: var(--rust);
      opacity: 0.6;
    }
 
    /* ── NAVIGATION BETWEEN POSTS ── */
    .post-nav {
      background: var(--bg-card);
      border-top: 1px solid var(--rule);
    }
    .post-nav-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 3rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }
    .post-nav-item {
      cursor: pointer;
      padding: 1.2rem;
      border: 1px solid var(--rule);
      background: var(--bg);
      transition: all 0.2s ease;
      text-decoration: none;
      display: block;
    }
    .post-nav-item:hover {
      border-color: var(--rust);
      transform: translateY(-2px);
    }
    .post-nav-item.next { text-align: right; }
    .nav-dir {
      font-family: var(--sans);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 0.4rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .post-nav-item.next .nav-dir { justify-content: flex-end; }
    .nav-title {
      font-family: var(--serif);
      font-size: 0.95rem;
      color: var(--ink);
      line-height: 1.35;
    }
    .nav-title em { font-style: italic; color: var(--rust); }
 
    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--rule);
      padding: 2rem 3rem;
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    footer p {
      font-family: var(--sans);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: var(--ink-muted);
      opacity: 0.6;
    }
 
    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .post-hero { animation: fadeUp 0.5s ease both; }
    .article-wrap { animation: fadeUp 0.5s 0.1s ease both; }
 
    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      nav { padding: 1rem 1.5rem; }
      .post-hero { padding: 3rem 1.5rem 2.5rem; }
      .article-wrap { padding: 2.5rem 1.5rem 4rem; }
      .post-nav-inner { grid-template-columns: 1fr; padding: 1.5rem; }
      footer { padding: 1.5rem; }
      .post-hero::after { display: none; }
    }
  </style>
</head>

<script>
  const posts = [
    {
      id: 'featured',
      num: '01',
      category: 'Himalayas',
      tag: 'Writing · Personal',
      date: 'March 2025',
      readTime: '8 min read',
      title: 'The Last Tea House Before <em>Everest Base Camp</em>',
      body: `
        <p>The sign is hand-painted, the letters uneven from altitude-thickened paint. "Himalayan Inn — Hot Tea — Wi-Fi (Sometimes)." At 5,140 metres above sea level, at the edge of Gorak Shep, this is the last permanent structure before the glaciers.</p>
        <p>We had been walking for eight days. My trekking partner Sana had stopped speaking in complete sentences somewhere around Namche Bazaar — not from altitude sickness, but from the kind of contemplative silence that the mountains impose on you whether you want it or not.</p>
        <blockquote><p>The mountains have a way of making all your plans irrelevant. You arrive with an itinerary and leave with a story that was never on it.</p></blockquote>
        <p>The tea house owner, a woman in her fifties whose name I never learned because she didn't offer it and I didn't ask, handed us each a tin cup of butter tea without being asked. The salt and fat hit immediately, warmth radiating outward from the stomach.</p>
        <div class="pull-quote">At 5,000 metres, every small comfort is <em>extraordinary.</em></div>
        <h3>The View From Here</h3>
        <p>From the window — a single pane of glass, surprisingly uncracked — you could see the Khumbu Glacier below and, on clear days, the shoulder of Everest itself. That morning was not a clear day. Low cloud had moved in overnight, and the mountain was a rumour, not a fact.</p>
        <p>I thought about how much of travel is exactly this: you go somewhere to see a thing, and instead you see the conditions around the thing. The cloud, the rain, the closed road. The detour becomes the destination. The tea house becomes the point.</p>
        <p>We stayed three hours longer than planned. Sana fixed a broken boot lace with wire from a small basket the owner kept behind the counter. I ate two bowls of dal bhat and wrote six pages of notes I would later lose to a corrupted SD card. The mountain stayed hidden.</p>
        <p>It did not matter. We had been there. The tea had been real. The silence between us had been companionable and earned. Some trips you remember for what you saw. This one I will remember for the tea house, the salt, and the cloud.</p>
      `
    },
    {
      id: 'manaslu',
      num: '02',
      category: 'Himalayas',
      tag: 'Writing · Personal',
      date: 'January 2025',
      readTime: '5 min read',
      title: '<em>Manaslu Circuit</em> in the Rain',
      body: `
        <p>Day three of rain. The trail had become a river in sections, and my boots — which I had waterproofed twice before leaving Kathmandu — had surrendered entirely to the moisture. My socks made sounds when I walked.</p>
        <p>The Manaslu Circuit is Nepal's less-famous answer to the Annapurna Circuit: longer, quieter, with higher passes and fewer tea houses. We had chosen the October window specifically to avoid the monsoon tail. The monsoon tail had not received this information.</p>
        <blockquote><p>Wet boots on a mountain are an argument you lose every time. The mountain does not negotiate. Eventually you just stop checking if your feet are dry.</p></blockquote>
        <h3>What Rain Gives You</h3>
        <p>But here is what the rain did give us: empty trails. The few other trekkers had turned back at Deng, citing conditions. We had the entire upper section of the circuit to ourselves — the villages, the passes, the ancient salt-trade route that once connected these valleys to Tibet.</p>
        <p>At Samagaon, a village so remote it has a direct helicopter connection but no road, we were fed by a family who seemed genuinely pleased to have guests in the off-season. The food was extraordinary: a buckwheat flatbread with local cheese, dried yak meat, and a fermented drink called tongba that warmed from the inside out.</p>
        <div class="pull-quote">Emptiness, in the right place, <em>is the destination.</em></div>
        <p>The rain stopped on the fourth day. We crossed Larkya Pass at dawn in brilliant, cold sunshine. The views were everything the guidebooks promised. But I think I will remember the rain more.</p>
      `
    },
    {
      id: 'pokhara',
      num: '03',
      category: 'Reflections',
      tag: 'Writing · Personal',
      date: 'October 2024',
      readTime: '4 min read',
      title: 'A Week in <em>Pokhara</em> Doing Nothing',
      body: `
        <p>I came to Pokhara to do nothing, which is a specific kind of ambition that takes effort to sustain. The instinct, when you arrive somewhere beautiful, is to plan — the paragliding, the boat on the lake, the sunrise at Sarangkot. I had already done all of these things. This trip, I planned to do none of them.</p>
        <p>The lakeside strip is relentlessly aimed at tourists, which in Pokhara means trekkers at the beginning or end of circuits, and so the whole place has the temporary, provisional feeling of a transit lounge. Everyone is either preparing to leave for somewhere harder or recovering from having left.</p>
        <h3>The Lake in the Morning</h3>
        <p>I woke early each morning and sat on the guesthouse balcony looking at Phewa Lake. In the first hour of daylight, before the boats came out, the water was perfectly still. Fishtail Mountain — Machhapuchhre — appeared in the reflection, which felt like a gift too large for the day that had barely started.</p>
        <blockquote><p>Some places reward return visits. Pokhara rewards doing less each time you come back. The city reveals itself in the gaps between plans.</p></blockquote>
        <p>I read two novels. I ate the same breakfast four days in a row. I found a tea house on a side street far from the main drag and went there every afternoon at four. The owner learned my order. I learned his son's name. This is, I think, what travel is for, on the days when it's working correctly.</p>
      `
    },
    {
      id: 'momo',
      num: '04',
      category: 'Food',
      tag: 'Writing · Personal',
      date: 'August 2024',
      readTime: '3 min read',
      title: 'In Pursuit of the <em>Perfect Momo</em>',
      body: `
        <p>I should be honest about what I mean by "data-driven." I made a spreadsheet with fifteen columns: wrapper thickness, filling ratio, folding technique, steaming vs frying preference, chutney heat level, and — most controversially — the structural integrity of the momo under dipping pressure. Forty-seven momos across eleven shops in three weeks.</p>
        <p>Kathmandu has excellent momos everywhere, which makes ranking them both easier and harder. The floor is very high. The question is not "which shop has good momos" but "which shop has the specific combination of qualities that, to my particular palate, constitutes greatness."</p>
        <h3>The Findings</h3>
        <p>Three shops emerged clearly in the data. I won't name them here because (a) Kathmandu's food scene moves fast and my findings are already months old, and (b) the best momo shop is the one near wherever you're staying, eaten standing up, while it's still too hot.</p>
        <blockquote><p>The best momo is always the next one. The moment you declare a winner, a better shop opens around the corner.</p></blockquote>
        <div class="pull-quote">Folding matters more than <em>anyone admits.</em></div>
        <p>What I will say: the folding matters more than people acknowledge. A well-folded momo is not merely aesthetic — the pleats create a chamber that holds the juices during steaming. A flat-sealed momo is essentially a different food. Order accordingly.</p>
      `
    },
    {
      id: 'india',
      num: '05',
      category: 'South Asia',
      tag: 'Writing · Personal',
      date: 'September 2024',
      readTime: '10 min read',
      title: 'Varanasi at <em>4 AM</em>',
      body: `
        <p>The boat pushes off from Assi Ghat in darkness. The oarsman — a young man whose family has worked this river for five generations — does not speak. There is nothing to say. The Ganges speaks enough.</p>
        <p>I had arrived in Varanasi expecting to be overwhelmed by the famous spectacle of it: the ghats, the burning, the bells, the colour. Varanasi is one of the most written-about cities on earth, which means arriving there with fresh eyes is essentially impossible. Every first impression is a palimpsest of someone else's description.</p>
        <p>What I had not expected was the hour before dawn. At 4 AM, the city is not asleep — Varanasi never quite sleeps — but it is at a different frequency. The priests are already at their work, the fire at Manikarnika already burning. But the tourist layer of the city has not yet activated.</p>
        <h3>The River at Its Truest</h3>
        <p>On the water, in darkness, you understand something about why this city exists. The river is the point. The city is an elaboration around that point, built up over three thousand years of people deciding that this particular bend in the Ganges was the correct place to be born and to die.</p>
        <blockquote><p>Varanasi does not explain itself. It simply continues, as it has for millennia, indifferent to interpretation.</p></blockquote>
        <div class="pull-quote">Some cities perform for visitors. Varanasi <em>doesn't notice them.</em></div>
        <p>We floated past the burning ghats. The oarsman slowed without being asked. There were families there, priests, the ordinary machinery of the city's central purpose. I looked and then looked away, aware that some things are not for outsiders to stare at, only to acknowledge.</p>
        <p>The sun came up slowly, then all at once. By 6 AM the ghats were busy with bathers and the first tourist boats were launching. The Varanasi of the photographs had arrived. I was glad to have seen the other one first.</p>
      `
    },
    {
      id: 'mustang',
      num: '06',
      category: 'Himalayas',
      tag: 'Writing · Personal',
      date: 'June 2024',
      readTime: '6 min read',
      title: 'Upper <em>Mustang</em> — The Forbidden Kingdom',
      body: `
        <p>The permit costs five hundred dollars for ten days, which is expensive by Nepali trekking standards and cheap for what it buys: access to a landscape that looks like Mars if Mars had Buddhist monasteries carved into its cliffs. Upper Mustang was closed to foreigners until 1992. It shows.</p>
        <p>The landscape is immediately, aggressively different from the rest of Nepal. Where the standard trek goes up through rhododendron forests into alpine meadows, Mustang is desert — dry, wind-carved, ochre and rust and grey. The erosion has created formations like melted architecture, columns and caves and overhangs that the locals have been using as shelter and storage for centuries.</p>
        <h3>Lo Manthang</h3>
        <p>The walled city of Lo Manthang is the capital of the former kingdom. The king — Lo Gyalpo, a title with no formal power since 2008 but still enormous cultural weight — was, when I visited, an elderly man who occasionally appeared at the gompa for ceremonies. The kingdom is gone. The sense of it lingers in the architecture, the language, and the pride of the people who remain.</p>
        <blockquote><p>Some places carry their history in the stone. Mustang carries it in the wind — in the prayer flags that have been replaced so many times no one remembers the first ones.</p></blockquote>
        <p>I spent two days in Lo Manthang, which was too few. The monastery paintings alone — some of them eight hundred years old, still vivid — would reward weeks of looking. I took photographs that failed to capture it and drew sketches that failed worse, and eventually put everything away and just looked.</p>
      `
    },
    {
      id: 'border',
      num: '07',
      category: 'Reflections',
      tag: 'Writing · Personal',
      date: 'April 2024',
      readTime: '5 min read',
      title: 'Crossing Into <em>Tibet</em> at Kodari',
      body: `
        <p>The Friendship Bridge is not friendly. It spans the Bhote Koshi river at a point where the gorge is narrow enough that you can see the Chinese checkpoint from the Nepali one, and both checkpoints are regarding each other with the particular wariness of adjacent bureaucracies.</p>
        <p>I had arranged the crossing as part of a larger circuit: Kathmandu to Lhasa by road, then west to Shigatse, then back down through Everest Base Camp on the Tibetan side. The paperwork was considerable. A thick stack of documents that the Chinese border official examined with the thoroughness of someone who has seen many attempted forgeries.</p>
        <h3>The Line Between</h3>
        <p>There is a moment, mid-bridge, where you are in neither country. The Nepali side recedes. The Chinese checkpoint grows. Below, the river — indifferent to political geography — continues toward India.</p>
        <blockquote><p>A border is an argument two governments are having. The river doesn't take sides. It has been flowing this way since before either government existed.</p></blockquote>
        <div class="pull-quote">The river flows through every border it has ever <em>ignored.</em></div>
        <p>On the Tibetan side, the landscape changed almost immediately: dryer, broader, the mountains set further back from the road. We drove north for hours without seeing another vehicle. This is Tibet's great gift to the traveller who expects Asia to be crowded: the space is immense and mostly empty, and the silence in it is the kind that cities make you forget exists.</p>
      `
    }
  ];

  document.title = post.title.replace(/<[^>]+>/g, '') + ' — My Blog';
  document.getElementById('postCategory').textContent = post.category;
  document.getElementById('navTag').textContent = post.tag;
  document.getElementById('navTitle').textContent = 'My Blog';
  document.getElementById('postTitle').innerHTML = post.title;
  document.getElementById('postDate').textContent = post.date;
  document.getElementById('postReadTime').textContent = post.readTime;
  document.getElementById('articleBody').innerHTML = post.body;
  document.getElementById('postHero').setAttribute('data-num', post.num);
 
  // Prev / Next navigation
  const prevPost = postIndex > 0 ? posts[postIndex - 1] : null;
  const nextPost = postIndex < posts.length - 1 ? posts[postIndex + 1] : null;
 
  const navPrev = document.getElementById('navPrev');
  const navNext = document.getElementById('navNext');
 
  if (prevPost) {
    document.getElementById('navPrevTitle').innerHTML = prevPost.title;
    navPrev.href = `blog-post.html?post=${prevPost.id}`;
  } else {
    navPrev.style.opacity = '0.3';
    navPrev.style.pointerEvents = 'none';
    document.getElementById('navPrevTitle').textContent = 'This is the first story';
  }
 
  if (nextPost) {
    document.getElementById('navNextTitle').innerHTML = nextPost.title;
    navNext.href = `blog-post.html?post=${nextPost.id}`;
  } else {
    navNext.style.opacity = '0.3';
    navNext.style.pointerEvents = 'none';
    document.getElementById('navNextTitle').textContent = 'This is the latest story';
  }
 
  // Reading progress bar
  window.addEventListener('scroll', () => {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
    document.getElementById('progressBar').style.width = progress + '%';
  });
</script>
</body>
</html>
